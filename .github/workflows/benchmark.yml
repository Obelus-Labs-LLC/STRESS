name: Benchmark
on:
  push:
    branches: [main]

permissions:
  contents: write
  deployments: write

jobs:
  benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Build
        run: cd stress-ref && cargo build --release

      - name: Run benchmark
        run: |
          cd stress-ref
          ./target/release/stress \
            --workload W1-A --profile SP-1 --seed 42 --runs 10 \
            --gds-levels 0.1,0.2,0.3 --isolation-duration 60.0 --c-total 5 \
            --out-dir ../benchmark-results

      - name: Check SRI threshold
        run: |
          python3 -c "
          import json, sys
          d = json.load(open('benchmark-results/aggregate_summary.json'))
          sri = d.get('sri', {}).get('mean')
          threshold = float('${SRI_THRESHOLD:-50}')
          if sri is None:
              print('SRI: N/A (some proxies could not be computed)')
              print('::warning::SRI is N/A — insufficient proxy data for this benchmark config')
              sys.exit(0)
          print(f'SRI: {sri:.2f} (threshold: {threshold})')
          if sri < threshold:
              print(f'::error::SRI {sri:.2f} below threshold {threshold}')
              sys.exit(1)
          "

      - name: Format for benchmark action
        run: |
          python3 -c "
          import json
          d = json.load(open('benchmark-results/aggregate_summary.json'))
          results = []
          for metric in ['gds', 'arr', 'ist', 'rec', 'cfr', 'sri']:
              mean = d[metric].get('mean')
              if mean is not None:
                  results.append({'name': metric.upper(), 'unit': 'score', 'value': round(mean, 4)})
          json.dump(results, open('benchmark-output.json', 'w'))
          "

      - name: Store benchmark result
        uses: benchmark-action/github-action-benchmark@v1
        with:
          tool: customBiggerIsBetter
          output-file-path: benchmark-output.json
          auto-push: true
          gh-pages-branch: gh-pages
          benchmark-data-dir-path: benchmarks
